name: cetracker
services:
  cetrack-frontend:
    image: ghcr.io/cetracker/cetrack-frontend:v3.0.1
    container_name: cetrack-frontend
    pull_policy: missing
    networks:
      backend:
        aliases:
          - frontend
        ipv4_address: 10.0.0.10
    ports:
      - "80:80"
    depends_on:
      - cetrack-backend

  cetrack-backend:
    image: ghcr.io/cetracker/cetrack-backend:v1.0.1
    container_name: cetrack-backend
    pull_policy: missing
    hostname: backend
    environment:
      # default in Image (Dockerfile) is 'postgres'
      # SPRING_PROFILES_ACTIVE: demo # uncomment for Demo data
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: cetracker
      POSTGRES_USER: cet
      POSTGRES_PASSWORD: components
      APP_MYTOURBOOK_WORKDIR: /var/lib/cetrack/mtb-upload
      # CETRACK_EDIT_PIN: 123456 # uncomment to PIN-gate mutating /api requests
    networks:
      backend:
        aliases:
          - backend
        ipv4_address: 10.0.0.20
      persistence:
        aliases:
          - backend
        ipv4_address: 10.0.1.20
    volumes:
      - type: volume
        source: mtb-upload
        target: /var/lib/cetrack/mtb-upload
    expose:
      - 8080
    ports:
      - "8080:8080"
    depends_on:
      cetrack-db:
        condition: service_healthy

  cetrack-db:
    # hardened image - requires `docker login dhi.io`
    # image: dhi.io/postgres:17
    # but needs chmod -R 65532:65532 dbdata `docker run --rm dhi.io/postgres:17 id`

    # image postgres:17 =>
    image: postgres@sha256:de1e13ca94377fa5a27aafd0e9fc200df9692b15152f0090fdf074074ea5e397
    container_name: cetrack-postgres
    pull_policy: missing
    restart: unless-stopped
    environment:
      POSTGRES_DB: cetracker
      POSTGRES_USER: cet
      POSTGRES_PASSWORD: components
      # subdirectory so the bind mount root may be non-empty (lost+found etc.)
      PGDATA: /var/lib/postgresql/data/pgdata
    #   FILE__POSTGRES_PASSWORD: /run/secrets/postgres_password
    # secrets:
    #   - postgres_password
    healthcheck:
      test: pg_isready -U cet -d cetracker
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
        # volume:
        #   nocopy: true
    hostname: postgres
    networks:
      persistence:
        aliases:
          - postgres
        ipv4_address: 10.0.1.30
    expose:
      - 5432

volumes:
  postgres-data:
  #https://stackoverflow.com/a/40030535
    driver: local
    driver_opts:
      type: 'none'
      device: ${PWD}/dbdata
      o: 'bind'
  mtb-upload:
    driver: local
    driver_opts:
      type: 'none'
      device: ${PWD}/mtb-upload
      o: 'bind'

# secrets:
#   postgres_password:
#     file: ${SECRETSDIR}/postgres_password

networks:
  backend:
    ipam:
      driver: default
      config:
        - subnet: 10.0.0.0/24
  persistence:
    ipam:
      driver: default
      config:
        - subnet: 10.0.1.0/24
